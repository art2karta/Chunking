      <script type="text/babel">
          const MapContext = React.createContext([undefined, () => {}]);

          const MapProvider = (props) => {
              const [mapInstance, setMapInstance] = React.useState();

              return (
                  <MapContext.Provider value={[mapInstance, setMapInstance]}>
                      {props.children}
                  </MapContext.Provider>
              );
          };

          const MapWrapper = React.memo(
              () => {
                  return <div id="map-container" style={{ width: '100%', height: '100%' }}></div>;
              },
              () => true,
          );
          const MapGL = () => {
              const [_, setMapInstance] = React.useContext(MapContext);

              React.useEffect(() => {
                  const map = new mapgl.Map('map-container', {
                      center: [37.615655, 55.768005],
                      zoom: 13,
                      key: '72df8181-6863-4cde-abaa-2f92ab6f4824',
                  });

                  setMapInstance(map);
                  return () => map.destroy();
              }, []);

              return (
                  <div style={{ width: '100%', height: '100%' }}>
                      <MapWrapper />
                  </div>
              );
          };
          const MoveMapButton = () => {
              const [mapInstance] = React.useContext(MapContext);

              const setInitialCenter = React.useCallback(() => {
                  if (mapInstance) {
                      mapInstance.setCenter([37.615655, 55.768005]);
                  }
              }, [mapInstance]);

              return (
                  <button style={{ padding: '4px 10px' }} onClick={setInitialCenter}>
                      Установить начальный центр
                  </button>
              );
          };
          const App = () => {
              return (
                  <div>
                      <div style={{ padding: '0 0 6px' }}>
                          Перетащите карту, а затем нажмите кнопку <MoveMapButton />
                      </div>
                      <br />
                      <div style={{ width: '100%', height: 250 }}>
                          <MapGL />
                      </div>
                  </div>
              );
          };

          ReactDOM.render(
              <MapProvider>
                  <App />
              </MapProvider>,
              document.getElementById('root'),
          );
      </script>
